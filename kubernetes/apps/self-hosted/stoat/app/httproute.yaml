---
# yaml-language-server: $schema=https://kubernetes-schemas.jacob-williams.me/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stoat
spec:
  hostnames:
    - chat.${SECRET_DOMAIN}
  parentRefs:
    - name: external
      namespace: network
      sectionName: https
    - name: internal
      namespace: network
      sectionName: https
  rules:
    # REST API — strip /api prefix
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: stoat-api
          port: 14702

    # WebSocket — strip /ws prefix
    - matches:
        - path:
            type: PathPrefix
            value: /ws
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: stoat-events
          port: 14703

    # File server (autumn) — strip /autumn prefix
    - matches:
        - path:
            type: PathPrefix
            value: /autumn
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: stoat-file-server
          port: 14704

    # File server direct attachment URLs (no prefix strip)
    - matches:
        - path:
            type: PathPrefix
            value: /attachments
      backendRefs:
        - name: stoat-file-server
          port: 14704

    # Proxy (january) — strip /january prefix
    - matches:
        - path:
            type: PathPrefix
            value: /january
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: stoat-proxy
          port: 14705

    # Gifbox (Tenor proxy) — strip /gifbox prefix
    - matches:
        - path:
            type: PathPrefix
            value: /gifbox
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: stoat-gifbox
          port: 14706

    # Web frontend — catch-all
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: stoat-web
          port: 5000
---
# yaml-language-server: $schema=https://kubernetes-schemas.jacob-williams.me/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stoat-livekit
spec:
  hostnames:
    - livekit.${SECRET_DOMAIN}
  parentRefs:
    - name: external
      namespace: network
      sectionName: https
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: stoat-livekit
          port: 7880
