---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: stoat-mongo
spec:
  members: 1
  type: ReplicaSet
  version: "8.0.0"
  security:
    authentication:
      modes:
        - "SCRAM"
  users:
    - name: stoat
      db: admin
      passwordSecretRef:
        name: stoat-mongo-password
        key: password
      roles:
        - name: readWriteAnyDatabase
          db: admin
        - name: dbAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: stoat-mongo-scram
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: ceph-block
            resources:
              requests:
                storage: 20Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: ceph-block
            resources:
              requests:
                storage: 2Gi
