---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
# Generates the full Revolt.toml as a Secret so passwords are never in a ConfigMap.
# 1Password item: "stoat" in vault "homelab"
# Required fields: RABBITMQ_PASSWORD, MONGO_PASSWORD, DRAGONFLY_PASSWORD,
#                  GARAGE_ACCESS_KEY, GARAGE_SECRET_KEY,
#                  VAPID_PRIVATE_KEY, VAPID_PUBLIC_KEY, FILES_ENCRYPTION_KEY,
#                  VOSO_LEGACY_TOKEN, LIVEKIT_SECRET, TENOR_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoat-config
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: stoat-config
    creationPolicy: Owner
    template:
      data:
        Revolt.toml: |
          production = true

          [hosts]
          app = "https://chat.jacob-williams.me"
          api = "https://chat.jacob-williams.me/api"
          events = "wss://chat.jacob-williams.me/ws"
          autumn = "https://chat.jacob-williams.me/autumn"
          january = "https://chat.jacob-williams.me/january"
          gifbox = "https://chat.jacob-williams.me/gifbox"

          [hosts.livekit]
          worldwide = "wss://livekit.jacob-williams.me"

          [api.livekit]
          [api.livekit.nodes.worldwide]
          url = "http://stoat-livekit.self-hosted.svc.cluster.local:7880"
          lat = 0.0
          lon = 0.0
          key = "worldwide"
          secret = "{{ .LIVEKIT_SECRET }}"

          [database]
          mongodb = "mongodb://stoat:{{ .MONGO_PASSWORD }}@stoat-mongo-svc.self-hosted.svc.cluster.local:27017/revolt?authSource=admin&replicaSet=stoat-mongo"
          redis = "redis://:{{ .DRAGONFLY_PASSWORD }}@stoat-dragonfly.self-hosted.svc.cluster.local:6379/"

          [rabbit]
          host = "stoat-rabbit.self-hosted.svc.cluster.local"
          port = 5672
          username = "stoat"
          password = "{{ .RABBITMQ_PASSWORD }}"

          [api]
          [api.registration]
          invite_only = true

          [api.smtp]
          # host = ""  # Leave empty to disable email verification

          [api.security]
          authifier_shield_key = ""
          voso_legacy_token = "{{ .VOSO_LEGACY_TOKEN }}"
          tenor_key = "{{ .TENOR_KEY }}"
          trust_cloudflare = false

          [api.workers]
          max_concurrent_connections = 50

          [pushd]
          production = true
          mass_mention_chunk_size = 200
          exchange = "revolt.notifications"
          message_queue = "notifications.origin.message"
          mass_mention_queue = "notifications.origin.mass_mention"
          fr_accepted_queue = "notifications.ingest.fr_accepted"
          fr_received_queue = "notifications.ingest.fr_received"
          generic_queue = "notifications.ingest.generic"
          ack_queue = "notifications.process.ack"

          [pushd.vapid]
          private_key = "{{ .VAPID_PRIVATE_KEY }}"
          public_key = "{{ .VAPID_PUBLIC_KEY }}"

          [pushd.fcm]
          queue = "notifications.outbound.fcm"
          key_type = ""
          project_id = ""
          private_key_id = ""
          private_key = ""
          client_email = ""
          client_id = ""
          auth_uri = ""
          token_uri = ""
          auth_provider_x509_cert_url = ""
          client_x509_cert_url = ""

          [pushd.apn]
          sandbox = false
          queue = "notifications.outbound.apn"
          pkcs8 = ""
          key_id = ""
          team_id = ""

          [files]
          encryption_key = "{{ .FILES_ENCRYPTION_KEY }}"
          webp_quality = 80.0
          blocked_mime_types = []
          clamd_host = ""
          scan_mime_types = [
              "application/vnd.microsoft.portable-executable",
              "application/vnd.android.package-archive",
              "application/zip",
          ]

          [files.limit]
          min_file_size = 1
          min_resolution = [1, 1]
          max_mega_pixels = 40
          max_pixel_side = 10_000

          [files.preview]
          attachments = [1280, 1280]
          avatars = [128, 128]
          backgrounds = [1280, 720]
          icons = [128, 128]
          banners = [480, 480]
          emojis = [128, 128]

          [files.s3]
          endpoint = "http://10.0.0.14:30188"
          path_style_buckets = true
          region = "garage"
          access_key_id = "{{ .GARAGE_ACCESS_KEY }}"
          secret_access_key = "{{ .GARAGE_SECRET_KEY }}"
          default_bucket = "stoat-uploads"

          [features]
          webhooks_enabled = true

          [features.limits]

          [features.limits.global]
          group_size = 100
          message_embeds = 5
          message_replies = 5
          message_reactions = 20
          server_emoji = 100
          server_roles = 200
          server_channels = 200

          new_user_hours = 72
          body_limit_size = 100_000_000

          [features.limits.new_user]
          outgoing_friend_requests = 5
          bots = 2
          message_length = 2000
          message_attachments = 5
          servers = 50

          [features.limits.new_user.file_upload_size_limit]
          attachments = 50_000_000
          avatars = 8_000_000
          backgrounds = 12_000_000
          icons = 5_000_000
          banners = 12_000_000
          emojis = 500_000

          [features.limits.default]
          outgoing_friend_requests = 10
          bots = 5
          message_length = 2000
          message_attachments = 5
          servers = 100
          video_resolution = [1920, 1080]

          [features.limits.default.file_upload_size_limit]
          attachments = 50_000_000
          avatars = 8_000_000
          backgrounds = 12_000_000
          icons = 5_000_000
          banners = 12_000_000
          emojis = 500_000
  dataFrom:
    - extract:
        key: stoat
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
# Password for the MongoDB community operator user — key must be named "password"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoat-mongo-password
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: stoat-mongo-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: stoat
        property: MONGO_PASSWORD
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
# RabbitMQ default user credentials — injected into the cluster via spec.override
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoat-rabbit-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: stoat-rabbit-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: stoat
        property: RABBITMQ_USERNAME
    - secretKey: password
      remoteRef:
        key: stoat
        property: RABBITMQ_PASSWORD
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
# Password for the Dragonfly instance
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoat-dragonfly-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: stoat-dragonfly-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: stoat
        property: DRAGONFLY_PASSWORD
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
# LiveKit config file — contains the signing key for WebRTC voice sessions
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stoat-livekit-config
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: stoat-livekit-config
    creationPolicy: Owner
    template:
      data:
        livekit.yaml: |
          port: 7880
          redis:
            address: stoat-dragonfly.self-hosted.svc.cluster.local:6379
            username: ""
            password: "{{ .DRAGONFLY_PASSWORD }}"
          rtc:
            port_range_start: 12321
            port_range_end: 12340
            use_external_ip: true
          webhook:
            api_key: worldwide
            urls:
              - 'http://stoat-voice-ingress.self-hosted.svc.cluster.local:8500/worldwide'
          logging:
            level: info
          keys:
            worldwide: "{{ .LIVEKIT_SECRET }}"
  dataFrom:
    - extract:
        key: stoat
