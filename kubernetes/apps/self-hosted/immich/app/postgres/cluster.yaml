---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgres
spec:
  instances: 3
  # Immich is on v3.0.0, which accepts VectorChord >=0.3 <2.0, so 0.4.2 is
  # not a hard pin anymore -- bump freely within that range.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.2
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClass: ceph-block
  superuserSecret:
    name: immich-postgres-superuser
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "400"
      shared_buffers: 256MB
    shared_preload_libraries:
      - "vchord.so"
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  resources:
    requests:
      cpu: 10m
      memory: 300Mi
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      data:
        compression: bzip2
      wal:
        compression: bzip2
        maxParallel: 8
      destinationPath: s3://pg-immich-backup/
      endpointURL: http://10.0.0.14:30188/
      serverName: immich-postgres-v1
      s3Credentials:
        accessKeyId:
          name: immich-postgres-superuser
          key: aws-access-key-id
        secretAccessKey:
          name: immich-postgres-superuser
          key: aws-secret-access-key
        region:
          name: immich-postgres-s3-region
          key: aws-region
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-postgres-owner
