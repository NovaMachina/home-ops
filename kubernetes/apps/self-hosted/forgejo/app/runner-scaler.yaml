---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: forgejo-runner-creds
  namespace: self-hosted
spec:
  secretTargetRef:
    - parameter: token
      name: forgejo-runner-secret
      key: token
---
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  labels:
    app: forgejo-runner
  name: forgejo-runner
  namespace: self-hosted
spec:
  jobTargetRef:
    template:
      metadata:
        labels:
          app: forgejo-runner
      spec:
        volumes:
          - name: runner-data
            emptyDir: {}
          - name: runner-config
            secret:
              secretName: forgejo-runner-config
          - name: runner-registration
            configMap:
              name: runner-registration
          - name: docker-sock
            emptyDir: {}
        restartPolicy: Never
        shareProcessNamespace: true
        containers:
          - name: runner
            image: code.forgejo.org/forgejo/runner:12.10.1
            command:
              - sh
              - -c
              - |
                while ! [ -S /var/run/docker.sock ]; do
                  echo 'waiting for docker daemon...'
                  sleep 5
                done

                cp /config/.runner /data/.runner

                forgejo-runner -c /registration/registration.yaml one-job
                touch /data/runner-done
            securityContext:
              privileged: true
              runAsUser: 0
            volumeMounts:
              - name: docker-sock
                mountPath: /var/run
              - name: runner-data
                mountPath: /data
              - name: runner-registration
                mountPath: /registration
                readOnly: false
              - name: runner-config
                mountPath: /config
                readOnly: false
          - name: daemon
            image: docker:29.5.0-dind
            command:
              - sh
              - -c
              - |
                dockerd-entrypoint.sh 2>&1 &

                until [ -f /data/runner-done ]; do
                  sleep 5
                  echo "watching main job execution"
                done

                echo "main container exited, stopping dind"
                exit 0
            env:
              - name: DOCKER_TLS_CERTDIR
                value: ""
            securityContext:
              privileged: true
              runAsUser: 0
            volumeMounts:
              - name: docker-sock
                mountPath: /var/run
              - name: runner-data
                mountPath: /data
  minReplicaCount: 0
  maxReplicaCount: 20
  pollingInterval: 30
  triggers:
    - type: forgejo-runner
      metadata:
        name: "runner"
        address: "http://forgejo.self-hosted.svc.cluster.local:3000/"
        global: "true"
        labels: "ubuntu-20,docker"
      authenticationRef:
        name: forgejo-runner-creds
