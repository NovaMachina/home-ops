---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-secret
    creationPolicy: Owner
    template:
      data:
        # Postgres init vars
        INIT_POSTGRES_HOST: postgres16-rw.database.svc.cluster.local
        INIT_POSTGRES_DBNAME: forgejo
        INIT_POSTGRES_USER: "{{ .DB_USER }}"
        INIT_POSTGRES_PASS: "{{ .DB_PASSWORD }}"
  dataFrom:
    - extract:
        key: forgejo
    - extract:
        key: mailgun
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret forgejo-initdb
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *secret
    template:
      data:
        INIT_POSTGRES_SUPER_USER: '{{ .POSTGRES_SUPER_USER }}'
        INIT_POSTGRES_SUPER_PASS: '{{ .POSTGRES_SUPER_PASS }}'
  dataFrom:
    - extract:
        key: cloudnative-pg
---
# yaml-language-server: $schema=https://schemas.tholinka.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret forgejo-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *secret
    template:
      data:
        app.ini: |
          APP_NAME = Forgejo: Beyond coding. We forge.
          RUN_USER = git
          RUN_MODE = prod
          WORK_PATH = /var/lib/gitea

          [repository]
          ROOT = /var/lib/gitea/git/repositories

          [repository.local]
          LOCAL_COPY_PATH = /tmp/gitea/local-repo

          [repository.upload]
          TEMP_PATH = /tmp/gitea/uploads

          [server]
          APP_DATA_PATH = /var/lib/gitea
          SSH_DOMAIN = localhost
          HTTP_PORT = 3000
          ROOT_URL = https://forgejo.${SECRET_DOMAIN}
          DISABLE_SSH = false
          ; In rootless gitea container only internal ssh server is supported
          START_SSH_SERVER = true
          SSH_PORT = 2222
          SSH_LISTEN_PORT = 2222
          BUILTIN_SSH_SERVER_USER = git
          LFS_START_SERVER =

          [database]
          PATH = /var/lib/gitea/data/gitea.db
          DB_TYPE = postgres
          HOST = postgres16-rw.database.svc.cluster.local:5432
          NAME = forgejo
          USER = {{ .DB_USER }}
          PASSWD = {{ .DB_PASSWORD }}

          [session]
          PROVIDER_CONFIG = /var/lib/gitea/data/sessions

          [picture]
          AVATAR_UPLOAD_PATH = /var/lib/gitea/data/avatars
          REPOSITORY_AVATAR_UPLOAD_PATH = /var/lib/gitea/data/repo-avatars

          [attachment]
          PATH = /var/lib/gitea/data/attachments

          [log]
          ROOT_PATH = /var/lib/gitea/data/log

          [security]
          INSTALL_LOCK = true
          SECRET_KEY = {{ .SECRET_KEY }}
          REVERSE_PROXY_LIMIT = 1
          REVERSE_PROXY_TRUSTED_PROXIES = *
          INTERNAL_TOKEN = {{ .INTERNAL_TOKEN }}

          [service]
          DISABLE_REGISTRATION = false
          REQUIRE_SIGNIN_VIEW = false

          [lfs]
          PATH = /var/lib/gitea/git/lfs

          [mailer]
          PROTOCOL = smtps
          ENABLED = true
          USER = {{ .MG_USERNAME }}
          PASSWD = {{ .MG_PASSWORD }}
          SMTP_ADDR = {{ .EMAIL_SERVER }}
          SMTP_PORT = 465
  dataFrom:
    - extract:
        key: forgejo
    - extract:
        key: mailgun
