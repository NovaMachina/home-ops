---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: unifi-os-server-tls-policy
  namespace: self-hosted
spec:
  targetRefs:
    - name: unifi-os-server
      kind: Service
      group: ""
      sectionName: https
  validation:
    # UOS presents a self-signed cert for unifi.local; Envoy sends this as SNI and
    # verifies against the pinned CA (ca-configmap.yaml) when re-encrypting to :443.
    hostname: unifi.local
    caCertificateRefs:
      - name: unifi-os-server-ca
        kind: ConfigMap
        group: ""
