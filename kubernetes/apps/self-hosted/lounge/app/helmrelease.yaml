---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lounge
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-labs
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      lounge:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        initContainers:
          volume-permissions:
            image:
              repository: docker.io/library/busybox
              tag: latest
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            command:
              - sh
              - -c
              - chown -R 1000:1000 /var/opt/thelounge
        containers:
          app:
            image:
              repository: ghcr.io/thelounge/thelounge
              tag: 4.5.0@sha256:f29bb3d4c785828e9856b994450501e48cb51f38353a5aa6c3bf836d9bffda3e
            env:
              - name: DT_ENV
                value: selfhosted
            resources:
              requests:
                cpu: 10m
                memory: 300Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        pod:
          enableServiceLinks: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: lounge
        ports:
          http:
            port: 9000
    route:
      main:
        enabled: true
        hostnames:
          - "lounge.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
          - name: internal
            namespace: network
            sectionName: https

    persistence:
      data:
        existingClaim: lounge
        globalMounts:
          - path: /var/opt/thelounge
