---
# yaml-language-server: $schema=https://kubernetes-schemas.jacob-williams.me/opentelemetry.io/opentelemetrycollector_v1beta1.json
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: open-telemetry-agent
  namespace: monitoring
spec:
  mode: daemonset
  targetAllocator:
    enabled: true
    allocationStrategy: per-node
    prometheusCR:
      enabled: true
      podMonitorSelector: {}
      serviceMonitorSelector: {}
      probeSelector: {}
  env:
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers
    - name: hostfs
      hostPath:
        path: /
    - name: otelcol-storage
      hostPath:
        path: /var/lib/otelcol
        type: DirectoryOrCreate
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true
    - name: hostfs
      mountPath: /hostfs
      readOnly: true
      mountPropagation: HostToContainer
    - name: otelcol-storage
      mountPath: /var/lib/otelcol
  config:
    extensions:
      health_check:
        endpoint: "${env:MY_POD_IP}:13133"
      file_storage:
        directory: /var/lib/otelcol

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "${env:MY_POD_IP}:4317"
          http:
            endpoint: "${env:MY_POD_IP}:4318"
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        include_file_name: false
        include_file_path: true
        retry_on_failure:
          enabled: true
        start_at: end
        operators:
          - id: container-parser
            type: container
            max_log_size: 102400
          - id: json-body-parser
            type: json_parser
            if: 'body matches "^\\s*\\{"'
            parse_from: body
            parse_to: attributes
            on_error: send
          - id: severity-from-level
            type: severity_parser
            if: 'attributes["level"] != nil'
            parse_from: attributes["level"]
            on_error: send
          - id: severity-from-severity
            type: severity_parser
            if: 'attributes["severity"] != nil and attributes["level"] != nil'
            parse_from: attributes["severity"]
            on_error: send
          - id: time-from-time
            type: time_parser
            if: 'attributes["time"] != nil'
            parse_from: attributes["time"]
            layout_type: gotime
            layout: '2006-01-02T15:04:05.999999999Z07:00'
            on_error: send
          - id: time-from-timestamp
            type: time_parser
            if: 'attributes["timestamp"] != nil and attributes["time"] != nil'
            parse_from: attributes["timestamp"]
            layout_type: gotime
            layout: '2006-01-02T15:04:05.999999999Z07:00'
            on_error: send
          - id: promote-message
            type: move
            if: 'attributes["message"] != nil'
            from: attributes["message"]
            to: body
          - id: promote-msg
            type: move
            if: 'attributes["msg"] != nil'
            from: attributes["msg"]
            to: body
      prometheus:
        config:
          scrape_configs:
            - job_name: opentelemetry-collector
              scrape_interval: 10s
              static_configs:
                - targets:
                    - "${env:MY_POD_IP}:8888"
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 30s
        endpoint: "${env:K8S_NODE_IP}:10250"
        extra_metadata_labels:
          - container.id
          - k8s.volume.type
        insecure_skip_verify: true
        metric_groups:
          - container
          - pod
          - node
          - volume
        metrics:
          container.cpu.usage:
            enabled: true
          container.uptime:
            enabled: true
          k8s.container.cpu_limit_utilization:
            enabled: true
          k8s.container.cpu_request_utilization:
            enabled: true
          k8s.container.memory_limit_utilization:
            enabled: true
          k8s.container.memory_request_utilization:
            enabled: true
          k8s.node.cpu.usage:
            enabled: true
          k8s.node.uptime:
            enabled: true
          k8s.pod.cpu.usage:
            enabled: true
          k8s.pod.cpu_limit_utilization:
            enabled: true
          k8s.pod.cpu_request_utilization:
            enabled: true
          k8s.pod.memory_limit_utilization:
            enabled: true
          k8s.pod.memory_request_utilization:
            enabled: true
          k8s.pod.uptime:
            enabled: true
      hostmetrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu: null
          disk: null
          filesystem:
            exclude_fs_types:
              fs_types:
                - autofs
                - binfmt_misc
                - bpf
                - cgroup2
                - configfs
                - debugfs
                - devpts
                - devtmpfs
                - fusectl
                - hugetlbfs
                - iso9660
                - mqueue
                - nsfs
                - overlay
                - proc
                - procfs
                - pstore
                - rpc_pipefs
                - securityfs
                - selinuxfs
                - squashfs
                - sysfs
                - tracefs
              match_type: strict
            exclude_mount_points:
              match_type: regexp
              mount_points:
                - /dev/*
                - /proc/*
                - /sys/*
                - /run/k3s/containerd/*
                - /var/lib/docker/*
                - /var/lib/kubelet/*
                - /snap/*
          load: null
          memory: null
          network: null

    exporters:
      otlp:
        endpoint: open-telemetry-gateway-collector.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    processors:
      batch:
        send_batch_size: 4096
        send_batch_max_size: 5000
      k8sattributes:
        extract:
          annotations: []
          labels: []
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.node.uid
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
        filter:
          node_from_env_var: K8S_NODE_NAME
        passthrough: true
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
    service:
      extensions:
        - health_check
        - file_storage
      pipelines:
        metrics:
          receivers:
            - otlp
            - kubeletstats
            - prometheus
            - hostmetrics
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp
        logs:
          receivers:
            - otlp
            - filelog
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlp
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: ${env:MY_POD_IP}
                    port: 8888

