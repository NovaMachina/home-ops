---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: codecentric
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/replicas
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      tag: "26.6.1"
    command:
      - "/opt/keycloak/bin/kc.sh"
      - "--verbose"
      - "start"
      - "--hostname=https://sso.${SECRET_DOMAIN}"
      - "--hostname-admin=https://sso-admin.${SECRET_DOMAIN}"
      - "--http-port=8080"
      - "--hostname-strict=false"
      - "--spi-events-listener-jboss-logging-success-level=info"
      - "--spi-events-listener-jboss-logging-error-level=warn"
    extraEnv: |
      - name: KC_BOOTSTRAP_ADMIN_USERNAME
        valueFrom:
          secretKeyRef:
            name: keycloak-secret
            key: KC_BOOTSTRAP_ADMIN_USERNAME
      - name: KC_BOOTSTRAP_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: keycloak-secret
            key: KC_BOOTSTRAP_ADMIN_PASSWORD
    extraInitContianers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 17
        envFrom:
          - secretRef:
              name: keycloak-secret
          - secretRef:
              name: keycloak-initdb
    dbchecker:
      enabled: true
    database:
      vendor: postgres
      hostname: postgres16-rw.database.svc.cluster.local
      port: 5432
      database: keycloak
      username: keycloak
      existingSecret: keycloak-secret
      existingSecretKey: KC_DB_PASSWORD
    http:
      relativePath: "/"
